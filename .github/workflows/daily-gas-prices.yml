name: Daily AAA gas price refresh

# Runs every morning, scrapes AAA's state gas-price averages, rewrites the
# price data in index.html + sample/shared.js, commits the change, and
# deploys to Cloudflare Pages. If prices are unchanged, it does nothing.

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC daily (~7am ET, after AAA's overnight update)
  workflow_dispatch:        # also runnable manually from the Actions tab

permissions:
  contents: write           # allow the job to commit + push the refreshed prices

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet certifi

      - name: Scrape AAA and update price data
        run: python scripts/update_gas_prices.py

      - name: Commit refreshed prices
        id: commit
        run: |
          if git diff --quiet -- index.html sample/shared.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No price change today — nothing to commit."
          else
            git config user.name  "gas-price-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html sample/shared.js
            git commit -m "Auto-refresh AAA gas prices ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy . --project-name=evsavings --commit-dirty=true
