<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9e9e9e"/><stop offset="100%" stop-color="#757575"/></linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b3e5fc"/><stop offset="100%" stop-color="#81d4fa"/></linearGradient>
  </defs>
  <g transform="translate(400,0) scale(-1,1)"><ellipse cx="200" cy="148" rx="160" ry="8" fill="#e0e0e0"/>
  <!-- Body: SUV facing RIGHT, taller profile -->
  <path d="M50 120 L50 75 Q50 70 55 68 L75 62 Q80 45 100 38 L130 33 L265 30 Q290 30 310 40 L345 58 Q355 62 358 72 L360 120" fill="url(#bodyGrad)" stroke="#424242" stroke-width="1.5"/>
  <!-- Windows: rear window steeper on left, windshield raked on right -->
  <path d="M82 61 L105 38 L263 32 L305 40 L340 58 Z" fill="url(#windowGrad)" stroke="#424242" stroke-width="1"/>
  <!-- B-pillar + C-pillar -->
  <line x1="180" y1="34" x2="178" y2="60" stroke="#424242" stroke-width="1.5"/>
  <line x1="240" y1="32" x2="238" y2="58" stroke="#424242" stroke-width="1.2"/>
  <!-- Door line -->
  <line x1="180" y1="60" x2="178" y2="118" stroke="#424242" stroke-width="1" opacity="0.5"/>
  <!-- Roof rails -->
  <line x1="115" y1="33" x2="280" y2="30" stroke="#424242" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Headlight (RIGHT = front) -->
  <path d="M358 74 L365 76 L365 95 L360 97" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <!-- Taillight (LEFT = rear) -->
  <path d="M50 72 L44 74 L44 92 L50 94" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
  <!-- Wheel wells -->
  <path d="M85 120 Q85 94 115 94 Q145 94 145 120" fill="#333"/>
  <path d="M268 120 Q268 94 298 94 Q328 94 328 120" fill="#333"/>
  <!-- Wheels -->
  <circle cx="115" cy="122" r="22" fill="#444"/><circle cx="115" cy="122" r="16" fill="#666"/><circle cx="115" cy="122" r="5" fill="#999"/>
  <circle cx="298" cy="122" r="22" fill="#444"/><circle cx="298" cy="122" r="16" fill="#666"/><circle cx="298" cy="122" r="5" fill="#999"/>
  <g stroke="#888" stroke-width="1.5" opacity="0.6">
    <line x1="115" y1="106" x2="115" y2="115"/><line x1="99" y1="122" x2="108" y2="122"/><line x1="122" y1="122" x2="131" y2="122"/><line x1="115" y1="129" x2="115" y2="138"/>
    <line x1="298" y1="106" x2="298" y2="115"/><line x1="282" y1="122" x2="291" y2="122"/><line x1="305" y1="122" x2="314" y2="122"/><line x1="298" y1="129" x2="298" y2="138"/>
  </g>
  <line x1="35" y1="144" x2="370" y2="144" stroke="#ccc" stroke-width="1"/>
</g></svg>
