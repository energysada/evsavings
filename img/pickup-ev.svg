<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4caf50"/><stop offset="100%" stop-color="#2e7d32"/></linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b3e5fc"/><stop offset="100%" stop-color="#81d4fa"/></linearGradient>
  </defs>
  <g transform="translate(420,0) scale(-1,1)"><ellipse cx="210" cy="148" rx="170" ry="8" fill="#e0e0e0"/>
  <!-- Bed (LEFT = rear) -->
  <path d="M40 120 L40 62 L50 58 L175 56 L175 120" fill="url(#bodyGrad)" stroke="#1b5e20" stroke-width="1.5"/>
