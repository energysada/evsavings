  <!-- B-pillar -->
  <line x1="275" y1="36" x2="273" y2="55" stroke="#1b5e20" stroke-width="1.5"/>
  <!-- Door line -->
  <line x1="275" y1="55" x2="273" y2="118" stroke="#1b5e20" stroke-width="1" opacity="0.5"/>
  <!-- Headlight (RIGHT = front) -->
  <path d="M374 74 L382 76 L382 95 L376 97" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <!-- Taillight (LEFT = rear) -->
  <path d="M40 65 L34 67 L34 85 L40 87" fill="#ef5350" stroke="#c62828" stroke-width="1"/>
  <!-- Wheel wells -->
  <path d="M80 120 Q80 94 110 94 Q140 94 140 120" fill="#333"/>
  <path d="M285 120 Q285 94 315 94 Q345 94 345 120" fill="#333"/>
  <!-- Wheels -->
  <circle cx="110" cy="122" r="23" fill="#444"/><circle cx="110" cy="122" r="17" fill="#666"/><circle cx="110" cy="122" r="5" fill="#999"/>
  <circle cx="315" cy="122" r="23" fill="#444"/><circle cx="315" cy="122" r="17" fill="#666"/><circle cx="315" cy="122" r="5" fill="#999"/>
  <g stroke="#888" stroke-width="1.5" opacity="0.6">
    <line x1="110" y1="105" x2="110" y2="114"/><line x1="93" y1="122" x2="102" y2="122"/><line x1="118" y1="122" x2="127" y2="122"/><line x1="110" y1="130" x2="110" y2="139"/>
    <line x1="315" y1="105" x2="315" y2="114"/><line x1="298" y1="122" x2="307" y2="122"/><line x1="323" y1="122" x2="332" y2="122"/><line x1="315" y1="130" x2="315" y2="139"/>
  </g>
