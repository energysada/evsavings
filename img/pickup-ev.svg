  <path d="M175 120 L175 56 L200 40 Q210 34 225 32 L310 30 Q330 30 345 42 L365 58 Q372 62 374 72 L376 120" fill="url(#bodyGrad)" stroke="#1b5e20" stroke-width="1.5"/>
